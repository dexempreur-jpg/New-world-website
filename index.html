<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New World Game Dev</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0f0f0f;color:white;overflow-x:hidden;scroll-behavior:smooth;}
canvas{position:fixed;top:0;left:0;z-index:-1;}
body::before, body::after{content:"";position:fixed;width:250px;height:250px;background:#ff7a00;filter:blur(150px);z-index:-1;}
body::before{top:-80px;left:-80px;} body::after{bottom:-80px;right:-80px;}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 60px;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);}
header h1{color:#ff7a00;}
nav a{color:white;margin-left:20px;text-decoration:none;transition:.3s;}
nav a:hover{color:#ff7a00;}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;overflow:hidden;}
.hero video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0.3;z-index:-1;}
.hero h2{font-size:65px;text-shadow:0 0 25px #ff7a00;margin-bottom:20px;}
.hero p{margin-bottom:30px;font-size:20px;}
.btn{padding:14px 35px;background:#ff7a00;border:none;color:white;border-radius:30px;cursor:pointer;font-weight:bold;transition:.3s;}
.btn:hover{transform:scale(1.1);box-shadow:0 0 25px #ff7a00;}
.section{padding:100px 60px;text-align:center;}
.section h2{color:#ff7a00;margin-bottom:50px;}
.cards{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;}
.card{background:#1b1b1b;padding:30px;width:320px;border-radius:15px;transition:.4s;border:1px solid rgba(255,122,0,0.3);}
.card:hover{transform:translateY(-15px);box-shadow:0 0 30px rgba(255,122,0,0.6);}
.card img{width:100%;border-radius:10px;margin-bottom:15px;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:10;}
.modal-content{background:#111;padding:40px;border-radius:15px;text-align:center;max-width:600px;width:90%;}
.close{color:#ff7a00;cursor:pointer;font-size:22px;float:right;}
form{display:flex;flex-direction:column;align-items:center;gap:15px;}
input,textarea{width:300px;padding:10px;background:#2a2a2a;border:none;border-radius:5px;color:white;}
footer{padding:30px;text-align:center;background:#0a0a0a;border-top:1px solid #ff7a00;}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<header>
<h1>New World Game Dev</h1>
<nav>
<a href="#home">Home</a>
<a href="#games">Games</a>
<a href="#announcements">Annonces</a>
<a href="#admin">Admin</a>
</nav>
</header>

<section class="hero" id="home">
<video autoplay muted loop>
<source src="your-cinematic-trailer.mp4" type="video/mp4">
</video>
<h2>Forge Worlds. Build Legends.</h2>
<p>RPG • Action • Adventure • MMORPG • Strategy</p>
<button class="btn" onclick="openModal()">Watch Trailer</button>
</section>

<section class="section" id="games">
<h2>🎮 Current & Upcoming Games</h2>
<div id="games" class="cards"></div>
</section>

<section class="section" id="announcements">
<h2>📢 Annonces</h2>
<div id="announcements" class="cards"></div>
</section>

<section class="section" id="admin">
<h2>🔑 Admin Login</h2>
<input id="email" value="dexempreur@gmail.com">
<input id="password" type="password" value="Kirigamune345">
<button class="btn" onclick="login()">Login</button>

<div id="adminPanel" style="display:none">
<h3>Ajouter un Jeu</h3>
<input id="gname" placeholder="Nom du jeu">
<input id="gdesc" placeholder="Description">
<button class="btn" onclick="addGame()">Ajouter</button>

<h3>Ajouter une Annonce</h3>
<input id="atitle" placeholder="Titre">
<input id="adesc" placeholder="Description">
<button class="btn" onclick="addAnnouncement()">Ajouter</button>
</div>
</section>

<footer>
© 2026 New World Game Dev — Legendary Studio Level
</footer>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">X</span>
<h2>Game Trailer</h2>
<iframe width="100%" height="315" src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe>
</div>
</div>

<script>
// Modal
function openModal(){document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}

// Particles
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2,dx:(Math.random()-0.5),dy:(Math.random()-0.5)});}
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="#ff7a00";ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;});requestAnimationFrame(animate);}
animate();

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyByy_Z8rxFI6i2slG6Va2bs4n7gaKo-5FU",
  authDomain: "new-world-game-dev-fd1fd.firebaseapp.com",
  projectId: "new-world-game-dev-fd1fd",
  storageBucket: "new-world-game-dev-fd1fd.firebasestorage.app",
  messagingSenderId: "976411264361",
  appId: "1:976411264361:web:001c3e1bcecfb23c5be9f8",
  measurementId: "G-3TT42DZCYZ"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

// Admin functions
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(()=>{alert("Connecté !"); document.getElementById("adminPanel").style.display="block";})
  .catch(e=>alert(e.message));
}

function addGame(){db.collection("games").add({name:gname.value,desc:gdesc.value});}
function addAnnouncement(){db.collection("announcements").add({title:atitle.value,desc:adesc.value});}

// Load content
db.collection("games").onSnapshot(snap=>{let html=""; snap.forEach(doc=>{let g=doc.data(); html+=`<div class="card"><h3>${g.name}</h3><p>${g.desc}</p></div>`}); document.getElementById("games").innerHTML=html;});
db.collection("announcements").onSnapshot(snap=>{let html=""; snap.forEach(doc=>{let a=doc.data(); html+=`<div class="card"><h3>${a.title}</h3><p>${a.desc}</p></div>`}); document.getElementById("announcements").innerHTML=html;});
</script>

</body>
</html>
